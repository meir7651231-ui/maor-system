# פריסה אוטומטית ל-GitHub Pages — כל דחיפה ל-main בונה ומפרסמת.
# שערי איכות לפני פרסום: typecheck + כל הבדיקות + build.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        run: |
          cd dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "deploy-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
